<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍞 暖心早午餐點餐機</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fbf7f0] text-[#5c5247] min-h-screen flex flex-col justify-between font-sans">

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 md:p-8 max-w-md w-full shadow-md border border-[#eaddcd]">
            
            <a href="../index.html" class="text-xs font-medium text-[#a89984] hover:text-[#5c5247] transition-colors">← back to total</a>

            <div class="text-center my-4">
                <h1 class="text-xl font-bold tracking-wide text-[#4a3f35]">🍞 晨光早午餐點餐機</h1>
                <p class="text-xs text-[#a89984] mt-0.5">點選喜愛的餐點，即時計算卡洛里</p>
            </div>

            <div class="space-y-3 my-6">
                <div onclick="addItem('酪梨吐司', 120, 320)" class="flex justify-between items-center p-3.5 bg-[#fcfbfa] hover:bg-[#f5ebd9] border border-[#f0e6d6] rounded-2xl cursor-pointer transition">
                    <div>
                        <span class="font-bold block text-sm">🥑 經典鮮酪梨吐司</span>
                        <span class="text-xs text-[#a89984]">320 kcal</span>
                    </div>
                    <span class="font-mono text-sm font-bold">$120</span>
                </div>

                <div onclick="addItem('美式咖啡', 65, 15)" class="flex justify-between items-center p-3.5 bg-[#fcfbfa] hover:bg-[#f5ebd9] border border-[#f0e6d6] rounded-2xl cursor-pointer transition">
                    <div>
                        <span class="font-bold block text-sm">☕ 經典深焙美式</span>
                        <span class="text-xs text-[#a89984]">15 kcal</span>
                    </div>
                    <span class="font-mono text-sm font-bold">$65</span>
                </div>

                <div onclick="addItem('燕麥奶拿鐵', 95, 180)" class="flex justify-between items-center p-3.5 bg-[#fcfbfa] hover:bg-[#f5ebd9] border border-[#f0e6d6] rounded-2xl cursor-pointer transition">
                    <div>
                        <span class="font-bold block text-sm">🥛 輕盈燕麥奶拿鐵</span>
                        <span class="text-xs text-[#a89984]">180 kcal</span>
                    </div>
                    <span class="font-mono text-sm font-bold">$95</span>
                </div>
            </div>

            <div class="bg-[#faf8f5] rounded-2xl p-4 border border-[#ebdcc7] font-mono text-xs space-y-2">
                <div class="font-bold text-center border-b border-dashed border-[#ebdcc7] pb-2 mb-2">✦ CURRENT RECEIPT // 明細 ✦</div>
                <div class="flex justify-between">
                    <span>總金額 (TOTAL):</span>
                    <span class="font-bold text-sm text-[#c87a53]">$<span id="total-price">0</span></span>
                </div>
                <div class="flex justify-between">
                    <span>總熱量 (CALORIES):</span>
                    <span class="font-bold text-[#8fa172]"><span id="total-calories">0</span> kcal</span>
                </div>
            </div>

            <button onclick="clearOrder()" class="w-full mt-4 bg-[#ebdcc7] hover:bg-[#dfceb6] text-[#5c5247] font-bold text-xs tracking-wider py-3 rounded-xl transition">
                CLEAR ALL // 清除重選
            </button>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-[#a89984]">have a nice day ☀️</footer>

    <script>
        let totalPrice = 0;
        let totalCalories = 0;

        function addItem(name, price, calories) {
            totalPrice += price;
            totalCalories += calories;

            document.getElementById('total-price').innerText = totalPrice;
            document.getElementById('total-calories').innerText = totalCalories;
        }

        function clearOrder() {
            totalPrice = 0;
            totalCalories = 0;
            document.getElementById('total-price').innerText = 0;
            document.getElementById('total-calories').innerText = 0;
        }
    </script>
</body>
</html>
