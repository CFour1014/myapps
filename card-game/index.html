<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 量子記憶翻牌矩陣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 實作 3D 翻牌視覺效果 */
        .perspective { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex flex-col justify-between font-sans">

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-900/60 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-800 max-w-xl w-full p-6 md:p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-purple-500 to-pink-500"></div>

            <div class="flex justify-between items-center mb-6">
                <a href="../index.html" class="inline-flex items-center text-xs font-mono tracking-widest text-slate-500 hover:text-purple-400 transition-colors uppercase">
                    <span class="mr-1">←</span> BACK TO HOST // 返回總覽
                </a>
                <button onclick="resetGame()" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-mono text-xs font-bold py-1.5 px-3 rounded-lg transition shadow-md shadow-purple-950/50">
                    🔄 REBOOT // 重新洗牌
                </button>
            </div>

            <div class="text-center mb-6">
                <h1 class="text-2xl font-black tracking-wider text-white flex items-center justify-center gap-2 drop-shadow-[0_0_10px_rgba(168,85,247,0.3)]">
                    <span>🎮</span> 量子神經記憶矩陣
                </h1>
                <div class="flex justify-center gap-6 mt-4 text-xs font-mono tracking-widest text-slate-400 uppercase">
                    <div>CLICKS // 翻牌次數：<span id="clicks" class="text-purple-400 font-bold">0</span></div>
                    <div>MATCHED // 已配對：<span id="matches" class="text-pink-400 font-bold">0 / 6</span></div>
                </div>
            </div>

            <div id="game-board" class="grid grid-cols-4 gap-3 md:gap-4 max-w-md mx-auto aspect-[4/3]">
                </div>

            <div id="win-message" class="mt-6 p-4 bg-purple-950/40 border border-purple-500/30 rounded-xl text-center hidden">
                <p class="text-purple-400 font-mono font-bold text-lg tracking-widest">🎉 [MATRIX UNLOCKED] // 解鎖成功</p>
                <p class="text-slate-400 text-xs mt-1 font-mono">神經元網路完全同步，記憶鏈結完成。</p>
            </div>

        </div>
    </main>

    <footer class="text-center py-4 text-xs font-mono text-slate-700 border-t border-slate-950">
        MEMORY_MATRIX // GAME_02
    </footer>

    <script>
        const cardIcons = ['🧬', '🛸', '🛰️', '⚡', '🔮', '👾', '🧬', '🛸', '🛰️', '⚡', '🔮', '👾'];
        let shuffledCards = [];
        let flippedCards = [];
        let matchedCount = 0;
        let clickCount = 0;
        let isWaiting = false;

        const gameBoard = document.getElementById('game-board');
        const clicksEl = document.getElementById('clicks');
        const matchesEl = document.getElementById('matches');
        const winMessage = document.getElementById('win-message');

        function initGame() {
            shuffledCards = [...cardIcons];
            for (let i = shuffledCards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledCards[i], shuffledCards[j]] = [shuffledCards[j], shuffledCards[i]];
            }

            gameBoard.innerHTML = '';
            flippedCards = [];
            matchedCount = 0;
            clickCount = 0;
            isWaiting = false;
            clicksEl.innerText = clickCount;
            matchesEl.innerText = `0 / 6`;
            winMessage.classList.add('hidden');

            shuffledCards.forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'perspective cursor-pointer w-full h-full';
                card.dataset.index = index;
                card.dataset.icon = icon;
                card.onclick = () => flipCard(card);

                card.innerHTML = `
                    <div class="card-inner w-full h-full relative transform-style-3d transition-transform duration-500 rounded-xl shadow-md border border-slate-800">
                        <div class="absolute inset-0 bg-slate-950 text-slate-500 flex items-center justify-center font-mono font-bold text-lg md:text-xl rounded-xl backface-hidden border border-slate-800 hover:border-purple-500/50 transition-colors">
                            [■]
                        </div>
                        <div class="absolute inset-0 bg-purple-950/40 flex items-center justify-center text-2xl md:text-3xl rounded-xl backface-hidden rotate-y-180 border-2 border-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.3)]">
                            ${icon}
                        </div>
                    </div>
                `;
                gameBoard.appendChild(card);
            });
        }

        function flipCard(card) {
            const inner = card.querySelector('.card-inner');
            if (isWaiting || flippedCards.includes(card) || inner.classList.contains('rotate-y-180')) return;

            inner.style.transform = 'rotateY(180deg)';
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                clickCount++;
                clicksEl.innerText = clickCount;
                checkMatch();
            }
        }

        function checkMatch() {
            isWaiting = true;
            const [card1, card2] = flippedCards;

            if (card1.dataset.icon === card2.dataset.icon) {
                matchedCount++;
                matchesEl.innerText = `${matchedCount} / 6`;
                
                // 配對成功：晶片亮綠光外框發光
                card1.querySelector('.card-inner').style.borderColor = '#10b981';
                card2.querySelector('.card-inner').style.borderColor = '#10b981';
                
                flippedCards = [];
                isWaiting = false;

                if (matchedCount === 6) {
                    setTimeout(() => { winMessage.classList.remove('hidden'); }, 300);
                }
            } else {
                // 配對失敗：亮紅光警告
                card1.querySelector('.card-inner').style.borderColor = '#ef4444';
                card2.querySelector('.card-inner').style.borderColor = '#ef4444';

                setTimeout(() => {
                    card1.querySelector('.card-inner').style.transform = '';
                    card2.querySelector('.card-inner').style.transform = '';
                    card1.querySelector('.card-inner').style.borderColor = '';
                    card2.querySelector('.card-inner').style.borderColor = '';
                    flippedCards = [];
                    isWaiting = false;
                }, 800);
            }
        }

        function resetGame() { initGame(); }
        window.onload = initGame;
    </script>
</body>
</html>
