<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 前端核心邏輯評測終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex flex-col justify-between font-sans">

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-900/60 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-800 max-w-xl w-full p-6 md:p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-blue-500 to-indigo-500"></div>

            <div class="flex justify-between items-center mb-6">
                <a href="../index.html" class="inline-flex items-center text-xs font-mono tracking-widest text-slate-500 hover:text-blue-400 transition-colors uppercase">
                    <span class="mr-1">←</span> BACK TO HOST // 返回總覽
                </a>
                <span id="quiz-progress" class="text-xs font-mono tracking-widest text-blue-400 bg-blue-950 border border-blue-900 px-2.5 py-1 rounded-full uppercase">
                    TASK 01 / 04
                </span>
            </div>

            <div class="w-full bg-slate-950 h-1.5 rounded-full mb-8 overflow-hidden border border-slate-800">
                <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full w-0 transition-all duration-300 shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
            </div>

            <div id="quiz-box">
                <h2 id="question-text" class="text-base md:text-lg font-bold tracking-wide text-white mb-6 leading-relaxed font-mono">
                    系統載入中...
                </h2>

                <div id="options-container" class="space-y-3.5">
                    </div>

                <div id="feedback-box" class="mt-6 p-4 rounded-xl text-xs font-mono tracking-wide border hidden">
                    </div>

                <button id="next-btn" onclick="nextQuestion()" 
                        class="w-full mt-6 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-mono font-bold tracking-widest text-xs uppercase py-3.5 rounded-xl transition duration-200 hidden shadow-lg shadow-blue-950/50">
                    NEXT STEP // 下一題 →
                </button>
            </div>

            <div id="result-box" class="hidden text-center py-6">
                <div class="text-5xl mb-4 drop-shadow-[0_0_15px_rgba(99,102,241,0.5)]">⚙️</div>
                <h2 class="text-2xl font-black tracking-wider text-white font-mono uppercase">[EVALUATION COMPLETED]</h2>
                <p class="text-slate-500 text-xs font-mono mt-1">核心邏輯評測完畢，核心同步率結果：</p>
                
                <div class="my-8 bg-slate-950 inline-block px-10 py-5 rounded-2xl border border-slate-800 shadow-inner">
                    <span class="text-slate-500 font-mono tracking-widest block text-xs uppercase mb-1">CORE INTEGRITY RATE</span>
                    <span id="final-score" class="text-5xl font-black text-blue-400 drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]">0</span>
                    <span class="text-slate-600 font-mono font-bold text-lg"> / 100 %</span>
                </div>

                <button onclick="restartQuiz()" 
                        class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-mono font-bold tracking-widest text-xs uppercase py-3.5 rounded-xl transition duration-200">
                    🔄 RE-ANALYZE // 重新同步
                </button>
            </div>

        </div>
    </main>

    <footer class="text-center py-4 text-xs font-mono text-slate-700 border-t border-slate-950">
        EVALUATION_TERMINAL // LOGIC_03
    </footer>

    <script>
        const quizData = [
            {
                question: "> TARGET_01: 在 HTML 中，哪一個標籤是用來嵌入外部 JavaScript 檔案？",
                options: ["[A] <link>", "[B] <script>", "[C] <js>", "[D] <style>"],
                correct: 1
            },
            {
                question: "> TARGET_02: 如果要在 CSS 裡實作 RWD 彈性網格排版，最常使用哪種佈局模式？",
                options: ["[A] Position", "[B] Float", "[C] Inline-block", "[D] Flexbox / Grid]"],
                correct: 3 
            },
            {
                question: "> TARGET_03: 在 JavaScript 中，下列哪種宣告變數的方式『無法』被重新賦值？",
                options: ["[A] const", "[B] let", "[C] var", "[D] function]"],
                correct: 0
            },
            {
                question: "> TARGET_04: 本次專題要求的網頁靜態託管服務，是將網頁發佈到哪一個平台？",
                options: ["[A] Google Drive", "[B] GitHub Pages", "[C] Dropbox", "[D] WordPress]"],
                correct: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnswered = false;

        const progressText = document.getElementById('quiz-progress');
        const progressBar = document.getElementById('progress-bar');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackBox = document.getElementById('feedback-box');
        const nextBtn = document.getElementById('next-btn');
        const quizBox = document.getElementById('quiz-box');
        const resultBox = document.getElementById('result-box');
        const finalScoreEl = document.getElementById('final-score');

        function loadQuestion() {
            hasAnswered = false;
            feedbackBox.classList.add('hidden');
            nextBtn.classList.add('hidden');
            optionsContainer.innerHTML = '';

            const totalQuestions = quizData.length;
            progressText.innerText = `TASK 0${currentQuestionIndex + 1} / 0${totalQuestions}`;
            const progressPercent = ((currentQuestionIndex) / totalQuestions) * 100;
            progressBar.style.width = `${progressPercent}%`;

            const currentData = quizData[currentQuestionIndex];
            questionText.innerText = currentData.question;

            currentData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = "w-full text-left px-5 py-3 rounded-xl border border-slate-800 bg-slate-950/50 hover:bg-slate-900 hover:border-slate-700 text-slate-300 font-mono text-sm transition duration-150 focus:outline-none";
                button.innerText = option;
                button.onclick = () => selectAnswer(index, button);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex, clickedButton) {
            if (hasAnswered) return;
            hasAnswered = true;

            const currentData = quizData[currentQuestionIndex];
            const correctIndex = currentData.correct;
            const buttons = optionsContainer.getElementsByTagName('button');

            for (let i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
                if (i === correctIndex) {
                    buttons[i].className = "w-full text-left px-5 py-3 rounded-xl border border-emerald-500/50 bg-emerald-950/30 text-emerald-400 font-mono text-sm font-bold shadow-[0_0_10px_rgba(16,185,129,0.2)]";
                }
            }

            feedbackBox.classList.remove('hidden');
            if (selectedIndex === correctIndex) {
                score += 25;
                feedbackBox.className = "mt-6 p-4 rounded-xl text-xs font-mono tracking-wide bg-emerald-950/30 text-emerald-400 border border-emerald-500/30";
                feedbackBox.innerText = ">> SUCCESS: 邏輯驗證通過。";
            } else {
                clickedButton.className = "w-full text-left px-5 py-3 rounded-xl border border-red-500/50 bg-red-950/30 text-red-400 font-mono text-sm font-bold shadow-[0_0_10px_rgba(239,68,68,0.2)]";
                feedbackBox.className = "mt-6 p-4 rounded-xl text-xs font-mono tracking-wide bg-red-950/30 text-red-400 border border-red-500/30";
                feedbackBox.innerText = `>> ERROR: 驗證失敗。CORRECT_RESPONSE_IS: ${currentData.options[correctIndex]}`;
            }

            nextBtn.classList.remove('hidden');
            if (currentQuestionIndex === quizData.length - 1) {
                nextBtn.innerText = "ACCESS REPORT // 產生分析報告 🏁";
            } else {
                nextBtn.innerText = "NEXT INSTRUCTION // 下一指令 →";
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                progressBar.style.width = `100%`;
                showResult();
            }
        }

        function showResult() {
            quizBox.classList.add('hidden');
            progressText.classList.add('hidden');
            resultBox.classList.remove('hidden');
            finalScoreEl.innerText = score;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            quizBox.classList.remove('hidden');
            progressText.classList.remove('hidden');
            resultBox.classList.add('hidden');
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
